<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADCS Web Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --panel: #10213a;
        --text: #f5f7fb;
        --muted: #92a2bd;
        --accent: #46a6ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        background: linear-gradient(135deg, var(--bg), #17304f);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(920px, 100%);
        background: rgba(16, 33, 58, 0.95);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      }
      h1 { margin: 0 0 8px; font-size: 2rem; }
      p { color: var(--muted); line-height: 1.6; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 24px; }
      .tile { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 18px; }
      .tile strong { display: block; margin-bottom: 6px; }
      button {
        margin-top: 18px; padding: 10px 16px; border: none; border-radius: 999px; background: var(--accent); color: white; font-weight: 600; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>ADCS Web Preview</h1>
      <p>This is a lightweight browser view for the ADCS app so it can be opened in Chrome while the Android version is being developed.</p>
      <div class="grid">
        <div class="tile"><strong>Splash</strong><span>Welcome screen</span></div>
        <div class="tile"><strong>Login</strong><span>Authentication flow</span></div>
        <div class="tile"><strong>Dashboard</strong><span>Agreement overview</span></div>
        <div class="tile"><strong>Agreement Flow</strong><span>Parties, property, rent, deposit, documents, summary</span></div>
      </div>
      <button onclick="alert('The Android app is ready to run; this browser preview is now open in Chrome.')">Open preview</button>
    </div>
  </body>
</html>
